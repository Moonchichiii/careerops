name: careerops

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: careerops
      POSTGRES_USER: careerops
      POSTGRES_PASSWORD: careerops
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U careerops -d careerops
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: unless-stopped

  assets:
    image: oven/bun:1.3.14-slim
    working_dir: /app
    command:
      - sh
      - -c
      - >
        bun install --frozen-lockfile --ignore-scripts
        && bun run web:dev
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    init: true
    restart: unless-stopped

  app:
    build:
      context: .
      target: development
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_SECRET_KEY: careerops-compose-development-only
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,app
      DATABASE_URL: postgresql://careerops:careerops@postgres:5432/careerops
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      assets:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import urllib.request;
          urllib.request.urlopen(
          'http://127.0.0.1:8000/health/live/',
          timeout=3
          ).read()
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    init: true
    restart: unless-stopped

volumes:
  postgres-data:
  node-modules: