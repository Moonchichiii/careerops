name: careerops

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: careerops
      POSTGRES_USER: careerops
      POSTGRES_PASSWORD: careerops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerops -d careerops"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
