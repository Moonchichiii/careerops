name: Python Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  python-quality:
    name: Python quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: careerops_test
          POSTGRES_USER: careerops
          POSTGRES_PASSWORD: careerops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U careerops -d careerops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: config.settings.tests
      DJANGO_SECRET_KEY: ci-only-secret-key
      DJANGO_ALLOWED_HOSTS: localhost,testserver
      TEST_DATABASE_URL: postgresql://careerops:careerops@127.0.0.1:5432/careerops_test
      DATABASE_URL: postgresql://careerops:careerops@127.0.0.1:5432/careerops_test

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked dependencies
        run: uv sync --locked --all-groups

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint Python
        run: uv run ruff check .

      - name: Type-check Python
        run: uv run mypy

      - name: Run Django checks
        run: |
          uv run python manage.py check --settings=config.settings.tests
          uv run python manage.py makemigrations --check --dry-run --settings=config.settings.tests

      - name: Run deployment checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          DJANGO_SECRET_KEY: 7c929ec8d3074e1083e5e70c19cfeb3c4bd229599ec5cb68d7927a49417427f2
          DJANGO_ALLOWED_HOSTS: example.com
        run: >-
          uv run python manage.py check --deploy --fail-level WARNING
          --settings=config.settings.production

      - name: Run tests
        run: uv run pytest
