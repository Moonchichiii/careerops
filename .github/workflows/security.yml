name: Security

on:
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-and-workflow-security:
    name: Dependency and workflow security
    uses: ./.github/workflows/_security-scan.yml

  osv-full-scan:
    name: OSV full repository scan
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@a82132c0bd6c7261ffcb78e754c46c70ab57ad9a # v2.3.8
    with:
      scan-args: |-
        --include-git-root
        -r
        ./

  osv-pull-request-scan:
    name: OSV pull request scan
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@a82132c0bd6c7261ffcb78e754c46c70ab57ad9a # v2.3.8
    with:
      scan-args: |-
        --include-git-root
        -r
        ./
