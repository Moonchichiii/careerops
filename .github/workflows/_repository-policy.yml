name: Repository Policy

on:
  workflow_call:

permissions:
  contents: read

jobs:
  policy:
    name: Repository policy
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify repository structure
        run: |
          test -f pyproject.toml
          test -f .python-version
          test -f uv.lock
          test -f compose.yaml
          test -f Dockerfile
          test -f .dockerignore
          test -f docker/development/start.sh
          test -f .github/workflows/_container-quality.yml
          test -f .env.example
          test -f .bun-version
          test -f package.json
          test -f bun.lock
          test -f biome.json
          test -f frontend/web-assets/tsconfig.json
          test -f frontend/web-assets/vite.config.ts
          test -f frontend/web-assets/src/main.ts
          test -f frontend/web-assets/src/styles/app.css
          test ! -f frontend/web-assets/src/styles.css
          test -f frontend/web-assets/static/.gitignore
          test ! -f package-lock.json
          test ! -f yarn.lock
          test ! -f pnpm-lock.yaml
          test ! -f pytest.ini
          test ! -f mypy.ini
          test ! -f ruff.toml
          test ! -f requirements.txt
          test -z "$(find . -type f \( -name pytest.ini -o -name mypy.ini -o -name ruff.toml -o -name requirements.txt \) -print -quit)"
          test -z "$(find . -type f \( -name 'postcss.config.*' -o -name 'tailwind.config.*' -o -name 'eslint.config.*' \) -print -quit)"
          test "$(find docs -name '*.dbml' -type f | wc -l)" -eq 1
