name: Reusable Security Scan

on:
  workflow_call:

permissions: {}

jobs:
  python-dependency-audit:
    name: Python dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked Python dependencies
        run: uv sync --locked --all-groups

      # uv intentionally creates the project environment without pip.
      # Run pip-audit as an isolated, exactly pinned uv tool and point it
      # at the project's installed site-packages directory.
      - name: Audit installed Python dependencies
        shell: bash
        run: |
          site_packages="$(uv run python -c 'import site; print(site.getsitepackages()[0])')"
          uvx --from pip-audit==2.10.1 pip-audit                     --strict                     --progress-spinner off                     --path "$site_packages"

  bun-dependency-audit:
    name: Bun dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect Bun workspace
        id: bun
        shell: bash
        run: |
          if [[ ! -f bun.lock ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Bun audit is inactive because bun.lock does not exist yet." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [[ ! -f .bun-version ]]; then
            echo "::error::bun.lock exists but .bun-version is missing. Pin Bun before enabling the workspace."
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Set up Bun
        if: steps.bun.outputs.enabled == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Verify frozen Bun installation
        if: steps.bun.outputs.enabled == 'true'
        run: bun install --frozen-lockfile

      - name: Audit all Bun dependencies
        if: steps.bun.outputs.enabled == 'true'
        run: bun audit --audit-level=high

      - name: Audit production Bun dependencies
        if: steps.bun.outputs.enabled == 'true'
        run: bun audit --prod --audit-level=moderate

  github-actions-security:
    name: GitHub Actions security
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Audit GitHub Actions workflows
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: false
          annotations: true
          online-audits: true
          persona: pedantic
          min-severity: medium
          min-confidence: high
          version: 1.21.0
