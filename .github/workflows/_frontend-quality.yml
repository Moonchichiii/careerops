name: Frontend Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install locked frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend quality gates
        run: bun run web:check

      - name: Audit frontend dependencies
        run: bun run security:audit

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked Python dependencies
        run: uv sync --locked --all-groups

      - name: Collect and verify built assets
        run: |
          uv run python manage.py collectstatic \
            --noinput \
            --clear \
            --settings=config.settings.tests

          uv run python - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path(
              "frontend/web-assets/static/careerops/.vite/manifest.json"
          )
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          entry = manifest["src/main.ts"]

          asset_paths = [
              entry["file"],
              *entry.get("css", []),
          ]

          missing = [
              asset_path
              for asset_path in asset_paths
              if not (
                  Path("staticfiles")
                  / "careerops"
                  / asset_path
              ).is_file()
          ]

          if missing:
              raise SystemExit(
                  f"Collected Vite assets are missing: {missing}"
              )
          PY